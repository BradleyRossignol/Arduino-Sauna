[env:giga_r1_m7]
platform = ststm32
board = giga_r1_m7
framework = arduino
monitor_speed = 115200
upload_protocol = dfu
lib_deps = 
    Arduino_GigaDisplay_GFX
    paulstoffregen/OneWire@^2.3.8 ; ← Correct OneWire (latest stable)
    milesburton/DallasTemperature@^3.11.0 ; ← Matches your current working version in Arduino IDE
    arduino-libraries/NTPClient@^3.2.1
    arduino-libraries/Arduino_GigaDisplayTouch ; ← Added for touch support
; Optional extras for stability/debug
; platform_packages =
; framework-arduino-mbed@https://github.com/arduino/ArduinoCore-mbed.git
; build_flags = -DCORE_DEBUG_LEVEL=4